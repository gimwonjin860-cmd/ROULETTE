<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>실내 vs 외부 데이트 배틀</title>
<meta property="og:title" content="실내 vs 외부 데이트 배틀">
<meta property="og:description" content="탭 배틀로 데이트 코스 결정하기 — 누가 이길까">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; width: 100%; overscroll-behavior: none; }
body {
  font-family: "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0a0a0a;
  color: #f5f5f5;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 18px;
  padding-top: calc(20px + env(safe-area-inset-top));
  padding-bottom: calc(20px + env(safe-area-inset-bottom));
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  position: relative;
  min-height: 100vh;
}
.bg-glow {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse 60% 50% at 0% 50%, rgba(229,89,52,0.10) 0%, transparent 70%),
    radial-gradient(ellipse 60% 50% at 100% 50%, rgba(61,165,217,0.10) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
.header { text-align: center; margin-top: 4px; position: relative; z-index: 2; width: 100%; }
.label {
  font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase;
  color: #888; margin-bottom: 8px; font-weight: 600;
}
.title { font-size: 24px; font-weight: 800; letter-spacing: -0.025em; color: #fff; line-height: 1.15; }

.vs-display {
  display: flex; width: 100%; max-width: 380px;
  margin: 20px 0 12px; align-items: center; justify-content: space-between;
  position: relative; z-index: 2;
}
.team { flex: 1; text-align: center; }
.team-name { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
.team-name.indoor { color: #E55934; }
.team-name.outdoor { color: #3DA5D9; }
.vs-text { font-size: 13px; font-weight: 700; color: #555; padding: 0 8px; }

.bar-container {
  width: 100%; max-width: 380px;
  position: relative; z-index: 2; margin: 4px 0 16px;
}
.bar-bg {
  width: 100%; height: 56px;
  background: #151515;
  border-radius: 999px; overflow: hidden; position: relative;
  border: 1px solid #2a2a2a;
}
.bar-indoor {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: linear-gradient(90deg, #E55934 0%, #FF7A52 100%);
  width: 50%;
}
.bar-outdoor {
  position: absolute; right: 0; top: 0; bottom: 0;
  background: linear-gradient(270deg, #3DA5D9 0%, #6BC0E8 100%);
  width: 50%;
}
.bar-center-marker {
  position: absolute; top: -8px; bottom: -8px; left: 50%;
  width: 3px; background: #f5f5f5;
  -webkit-transform: translateX(-50%); transform: translateX(-50%);
  border-radius: 2px; z-index: 3;
}
.pct-row {
  display: flex; justify-content: space-between; width: 100%;
  margin-top: 10px; font-size: 14px; font-weight: 700;
}
.pct-indoor { color: #E55934; }
.pct-outdoor { color: #3DA5D9; }

.timer {
  font-size: 12px; color: #888; margin-bottom: 14px;
  font-weight: 600; letter-spacing: 0.08em;
  position: relative; z-index: 2;
}

.tap-zone {
  flex: 1; width: 100%; max-width: 380px;
  min-height: 180px; padding: 24px;
  background: linear-gradient(135deg, #1a1a1a 0%, #242424 100%);
  border: 2px solid #3DA5D9;
  border-radius: 24px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer; position: relative; z-index: 2;
  -webkit-transition: -webkit-transform 0.05s ease, border-color 0.2s;
  transition: transform 0.05s ease, border-color 0.2s;
}
.tap-zone:active { -webkit-transform: scale(0.97); transform: scale(0.97); }
.tap-zone.disabled { opacity: 0.3; pointer-events: none; }
.tap-label-small { font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; color: #888; margin-bottom: 8px; font-weight: 600; }
.tap-label-big {
  font-size: 30px; font-weight: 800; color: #3DA5D9;
  letter-spacing: -0.02em;
  -webkit-transition: -webkit-transform 0.08s ease;
  transition: transform 0.08s ease;
}
.tap-hint { font-size: 12px; color: #666; margin-top: 10px; line-height: 1.4; text-align: center; }

.start-btn, .restart-btn {
  width: 100%; max-width: 380px;
  padding: 18px 32px; font-size: 17px; font-weight: 700;
  border: none; background: #f5f5f5; color: #0a0a0a;
  border-radius: 999px; cursor: pointer;
  font-family: inherit; letter-spacing: -0.01em;
  -webkit-appearance: none; appearance: none;
  margin-top: 14px; position: relative; z-index: 2;
  -webkit-transition: -webkit-transform 0.15s; transition: transform 0.15s;
}
.start-btn:active, .restart-btn:active { -webkit-transform: scale(0.97); transform: scale(0.97); }

.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85); z-index: 100;
  display: none; align-items: center; justify-content: center;
  padding: 24px;
  -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
}
.modal-overlay.show { display: flex; }
.modal-card {
  background: #1a1a1a; border-radius: 24px;
  padding: 40px 28px; text-align: center;
  width: 100%; max-width: 360px;
  border: 1px solid #2a2a2a;
}
.win-icon-circle {
  width: 88px; height: 88px; margin: 0 auto 20px;
  border-radius: 50%; display: flex;
  align-items: center; justify-content: center;
  font-size: 44px; font-weight: 800; color: white;
}
.win-icon-circle.indoor { background: linear-gradient(135deg, #E55934, #FF7A52); }
.win-icon-circle.outdoor { background: linear-gradient(135deg, #3DA5D9, #6BC0E8); }
.win-title { font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 8px; letter-spacing: -0.025em; }
.win-subtitle { font-size: 14px; color: #888; margin-bottom: 4px; }
.win-result { font-size: 30px; font-weight: 800; margin: 8px 0 12px; letter-spacing: -0.025em; }
.win-result.indoor { color: #E55934; }
.win-result.outdoor { color: #3DA5D9; }
.win-time { font-size: 13px; color: #666; margin-bottom: 24px; font-weight: 600; letter-spacing: 0.05em; }

@-webkit-keyframes pop {
  0%   { -webkit-transform: scale(0.6); opacity: 0; }
  60%  { -webkit-transform: scale(1.08); }
  100% { -webkit-transform: scale(1); opacity: 1; }
}
@keyframes pop {
  0%   { transform: scale(0.6); opacity: 0; }
  60%  { transform: scale(1.08); }
  100% { transform: scale(1); opacity: 1; }
}
.modal-card { -webkit-animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
</style>
</head>
<body>
<div class="bg-glow"></div>

<div class="header">
  <div class="label">데이트 배틀</div>
  <div class="title">실내 vs 외부</div>
</div>

<div class="vs-display">
  <div class="team"><div class="team-name indoor">실내데이트</div></div>
  <div class="vs-text">VS</div>
  <div class="team"><div class="team-name outdoor">외부데이트</div></div>
</div>

<div class="bar-container">
  <div class="bar-bg">
    <div class="bar-indoor" id="bar-indoor"></div>
    <div class="bar-outdoor" id="bar-outdoor"></div>
    <div class="bar-center-marker"></div>
  </div>
  <div class="pct-row">
    <span class="pct-indoor" id="pct-indoor">50%</span>
    <span class="pct-outdoor" id="pct-outdoor">50%</span>
  </div>
</div>

<div class="timer" id="timer-display">준비하셈</div>

<div class="tap-zone" id="tap-zone">
  <div class="tap-label-small">탭해서 응원하기</div>
  <div class="tap-label-big" id="tap-big">시작하셈</div>
  <div class="tap-hint" id="tap-hint">시작 버튼 누르면<br>6초 안에 외부데이트 채우기 도전</div>
</div>

<button class="start-btn" id="start-btn">시작하기</button>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-card">
    <div class="win-icon-circle" id="win-icon">★</div>
    <div class="win-title">축하합니다!</div>
    <div class="win-subtitle">오늘의 데이트는</div>
    <div class="win-result" id="win-result"></div>
    <div class="win-time" id="win-time"></div>
    <button class="restart-btn" id="restart-btn">다시 하기</button>
  </div>
</div>

<script>
(function(){
  var position = 50;
  var gameRunning = false;
  var startTimestamp = null;
  var lastFrame = null;
  var rafId = null;

  var AI_RATE = 8;
  var TAP_BOOST = 2.5;

  var barIndoor = document.getElementById('bar-indoor');
  var barOutdoor = document.getElementById('bar-outdoor');
  var pctIndoor = document.getElementById('pct-indoor');
  var pctOutdoor = document.getElementById('pct-outdoor');
  var timerDisplay = document.getElementById('timer-display');
  var tapZone = document.getElementById('tap-zone');
  var tapBig = document.getElementById('tap-big');
  var tapHint = document.getElementById('tap-hint');
  var startBtn = document.getElementById('start-btn');
  var modal = document.getElementById('modal-overlay');
  var winIcon = document.getElementById('win-icon');
  var winResult = document.getElementById('win-result');
  var winTime = document.getElementById('win-time');
  var restartBtn = document.getElementById('restart-btn');

  function updateBar() {
    var indoorPct = 100 - position;
    var outdoorPct = position;
    barIndoor.style.width = indoorPct + '%';
    barOutdoor.style.width = outdoorPct + '%';
    pctIndoor.textContent = Math.round(indoorPct) + '%';
    pctOutdoor.textContent = Math.round(outdoorPct) + '%';
  }

  function startGame() {
    position = 50;
    gameRunning = true;
    startTimestamp = null;
    lastFrame = null;
    tapZone.classList.remove('disabled');
    tapBig.textContent = '탭! 탭! 탭!';
    tapHint.textContent = '쉬지 말고 빠르게 누르셈';
    startBtn.style.display = 'none';
    timerDisplay.textContent = '진행 중...';
    updateBar();
    rafId = requestAnimationFrame(gameLoop);
  }

  function gameLoop(timestamp) {
    if (!gameRunning) return;
    if (startTimestamp === null) startTimestamp = timestamp;
    if (lastFrame === null) lastFrame = timestamp;
    var dt = timestamp - lastFrame;
    lastFrame = timestamp;
    position -= (AI_RATE / 1000) * dt;
    if (position <= 0) { position = 0; updateBar(); endGame('indoor'); return; }
    if (position >= 100) { position = 100; updateBar(); endGame('outdoor'); return; }
    var elapsed = (timestamp - startTimestamp) / 1000;
    timerDisplay.textContent = elapsed.toFixed(1) + 's';
    updateBar();
    rafId = requestAnimationFrame(gameLoop);
  }

  function tap() {
    if (!gameRunning) return;
    position += TAP_BOOST;
    if (position >= 100) { position = 100; updateBar(); endGame('outdoor'); return; }
    updateBar();
    tapBig.style.webkitTransform = 'scale(1.12)';
    tapBig.style.transform = 'scale(1.12)';
    setTimeout(function() {
      tapBig.style.webkitTransform = 'scale(1)';
      tapBig.style.transform = 'scale(1)';
    }, 70);
    try { if (navigator.vibrate) navigator.vibrate(15); } catch(e) {}
  }

  function endGame(winner) {
    gameRunning = false;
    if (rafId) cancelAnimationFrame(rafId);
    tapZone.classList.add('disabled');

    var elapsedSec = startTimestamp ? ((performance.now() - startTimestamp) / 1000) : 0;
    var elapsedStr = elapsedSec.toFixed(1) + '초';
    var resultText = (winner === 'indoor') ? '실내데이트' : '외부데이트';

    if (winner === 'indoor') {
      winIcon.textContent = '실';
      winIcon.className = 'win-icon-circle indoor';
      winResult.textContent = resultText;
      winResult.className = 'win-result indoor';
    } else {
      winIcon.textContent = '외';
      winIcon.className = 'win-icon-circle outdoor';
      winResult.textContent = resultText;
      winResult.className = 'win-result outdoor';
    }
    winTime.textContent = elapsedStr + ' 만에 결정';

    submitToForm(resultText, elapsedStr);

    setTimeout(function() {
      modal.classList.add('show');
      try { if (navigator.vibrate) navigator.vibrate([60, 40, 60, 40, 120]); } catch(e) {}
    }, 250);
  }

  function submitToForm(result, time) {
    try {
      var formUrl = 'https://docs.google.com/forms/d/e/1FAIpQLSenRRBnx0r5T7On2vdjTc9y4gbFzv0lsSu77Lek85Wgxejo_g/formResponse';
      var formData = new FormData();
      formData.append('entry.1521189206', result);
      formData.append('entry.1599259705', time);
      fetch(formUrl, { method: 'POST', mode: 'no-cors', body: formData }).catch(function(){});
    } catch(e) {}
  }

  function resetGame() {
    modal.classList.remove('show');
    position = 50;
    updateBar();
    timerDisplay.textContent = '준비하셈';
    tapBig.textContent = '시작하셈';
    tapHint.innerHTML = '시작 버튼 누르면<br>6초 안에 외부데이트 채우기 도전';
    startBtn.style.display = '';
  }

  startBtn.addEventListener('click', startGame);
  tapZone.addEventListener('click', tap);
  tapZone.addEventListener('touchstart', function(e) {
    e.preventDefault();
    tap();
  }, { passive: false });
  restartBtn.addEventListener('click', resetGame);

  var lastTouch = 0;
  document.addEventListener('touchend', function(e) {
    var now = Date.now();
    if (now - lastTouch <= 300) {
      try { e.preventDefault(); } catch(err) {}
    }
    lastTouch = now;
  }, { passive: false });

  updateBar();
})();
</script>
</body>
</html>
